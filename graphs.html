<!DOCTYPE html>
<html>
<head>
<title>Statistics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0f172a; color:white; text-align:center; font-family:Arial; }
nav { padding:15px; background:#020617; }
nav a { color:#60a5fa; margin:20px; }

canvas {
  max-width:500px;
  margin:20px auto;
  display:block;
}
</style>
</head>

<body>

<nav>
<a href="index.html">Information</a>
<a href="graphs.html">Statistics</a>
<a href="quiz.html">Quiz</a>
</nav>

<h1>Diabetes Statistics</h1>

<canvas id="chart1"></canvas>
<canvas id="chart2"></canvas>
<canvas id="chart3"></canvas>

<script>
new Chart(document.getElementById("chart1"), {
  type: "pie",
  data: {
    labels: ["Diagnosed", "Undiagnosed"],
    datasets: [{ data: [80, 20] }]
  }
});

new Chart(document.getElementById("chart2"), {
  type: "bar",
  data: {
    labels: ["Healthy", "Inactive", "High Sugar"],
    datasets: [{ data: [15, 60, 75] }]
  }
});

new Chart(document.getElementById("chart3"), {
  type: "line",
  data: {
    labels: ["2000","2005","2010","2015","2020","2023"],
    datasets: [{ data: [17,20,26,30,34,37] }]
  }
});
</script>

</body>
</html>
